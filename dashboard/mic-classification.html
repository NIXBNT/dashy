<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Peptide Dashboard · MIC Classification</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script><style>:root { --bg:#0b1020; --panel:#121933; --text:#e8ecf8; --muted:#98a2c3; --border:#243055; } * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#0b1020,#0f1731); color:var(--text);} .wrap{max-width:1400px;margin:0 auto;padding:24px;} .nav{position:sticky;top:0;z-index:10;background:rgba(11,16,32,.88);border-bottom:1px solid var(--border);margin:-24px -24px 20px;padding:14px 24px;} .nav a{display:inline-block;margin-right:12px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;text-decoration:none;color:var(--text);} .panel{background:rgba(18,25,51,.88);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px;} .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;} .span-6{grid-column:span 6;} .span-12{grid-column:span 12;} table{width:100%;border-collapse:collapse;} th,td{padding:10px 8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;} th{position:sticky;top:0;background:var(--panel);} p{color:var(--muted)} .table-wrap{max-height:720px;overflow:auto;} @media(max-width:900px){.span-6,.span-12{grid-column:span 12;}}</style></head><body><div class="wrap"><nav class="nav" id="nav"></nav><div class="panel"><h1 id="title"></h1><p id="summary"></p></div><div class="grid"><div class="panel span-6"><h2>Best family by organism</h2><div id="bestBars" style="height:420px"></div></div><div class="panel span-6"><h2>Best balanced accuracy by organism</h2><div id="accBars" style="height:420px"></div></div><div class="panel span-12"><h2>Organism-specific active/inactive leaderboard</h2><div class="table-wrap"><table id="tbl"></table></div></div></div></div><script>const fmt=(n,d=4)=>n==null?'—':Number(n).toFixed(d);fetch('./data.json').then(r=>r.json()).then(data=>{const sections=data.dashboardMeta?.sections||[];document.getElementById('nav').innerHTML=sections.map(s=>`<a href="./${s.page||'index.html'}">${s.label}</a>`).join('');const a=data.micClassificationV3;document.getElementById('title').textContent=a.title;document.getElementById('summary').textContent=a.summary;const rows=a.results||[];Plotly.newPlot('bestBars',[{x:rows.map(r=>r.organism),y:rows.map(r=>r.leaderboard[0].balanced_accuracy),text:rows.map(r=>r.best_family),type:'bar',marker:{color:rows.map((_,i)=>i),colorscale:'Viridis'},hovertemplate:'%{x}<br>%{text}<br>balanced acc=%{y:.4f}<extra></extra>'}],{paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{color:'#e8ecf8'},yaxis:{gridcolor:'#243055'},margin:{t:20,l:50,r:10,b:120}},{displayModeBar:false,responsive:true});Plotly.newPlot('accBars', rows.map(r=>({x:r.leaderboard.map(x=>x.family),y:r.leaderboard.map(x=>x.balanced_accuracy),type:'bar',name:r.organism})), {barmode:'group',paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{color:'#e8ecf8'},yaxis:{gridcolor:'#243055'},margin:{t:20,l:50,r:10,b:120}}, {displayModeBar:false,responsive:true});document.getElementById('tbl').innerHTML=`<thead><tr><th>organism</th><th>threshold µM</th><th>n active / inactive</th><th>best family</th><th>leaderboard</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.organism}</td><td>${fmt(r.active_threshold_mic_uM)}</td><td>${r.active_count} / ${r.inactive_count}</td><td>${r.best_family}</td><td>${r.leaderboard.map(x=>`${x.family}: balanced acc ${fmt(x.balanced_accuracy)} · F1 ${fmt(x.f1)} · acc ${fmt(x.accuracy)} · precision ${fmt(x.precision)} · recall ${fmt(x.recall)}`).join('<br>')}</td></tr>`).join('')}</tbody>`;});</script></body></html>
