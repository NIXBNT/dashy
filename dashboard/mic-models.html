<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peptide Dashboard · MIC Models</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { --bg:#0b1020; --panel:#121933; --text:#e8ecf8; --muted:#98a2c3; --border:#243055; }
    * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#0b1020,#0f1731); color:var(--text); }
    .wrap{max-width:1400px;margin:0 auto;padding:24px;} .nav{position:sticky;top:0;z-index:10;background:rgba(11,16,32,.88);border-bottom:1px solid var(--border);margin:-24px -24px 20px;padding:14px 24px;} .nav a{display:inline-block;margin-right:12px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;text-decoration:none;color:var(--text);} .panel{background:rgba(18,25,51,.88);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px;} .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;} .span-6{grid-column:span 6;} .span-12{grid-column:span 12;} .table-wrap{max-height:720px;overflow:auto;} table{width:100%;border-collapse:collapse;} th,td{padding:10px 8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;} th{position:sticky;top:0;background:var(--panel);} p{color:var(--muted)} @media(max-width:900px){.span-6,.span-12{grid-column:span 12;}}
  </style>
</head>
<body>
<div class="wrap">
  <nav class="nav" id="nav"></nav>
  <div class="panel"><h1 id="title"></h1><p id="summary"></p></div>
  <div class="grid">
    <div class="panel span-6"><h2>Best family by organism</h2><div id="bestBars" style="height:420px"></div></div>
    <div class="panel span-6"><h2>Best R² by organism</h2><div id="r2Bars" style="height:420px"></div></div>
    <div class="panel span-12"><h2>Per-organism MIC modeling leaderboard</h2><div class="table-wrap"><table id="resultTable"></table></div></div>
  </div>
</div>
<script>
const fmt=(n,d=4)=>n==null?'—':Number(n).toFixed(d);
fetch('./data.json').then(r=>r.json()).then(data=>{
  const sections=data.dashboardMeta?.sections||[];
  document.getElementById('nav').innerHTML=sections.map(s=>`<a href="./${s.page||'index.html'}">${s.label}</a>`).join('');
  const a=data.micSubsetModels;
  document.getElementById('title').textContent=a.title;
  document.getElementById('summary').textContent=a.summary;
  const rows=a.results||[];
  Plotly.newPlot('bestBars',[{x:rows.map(r=>r.organism),y:rows.map(r=>r.leaderboard[0].r2),text:rows.map(r=>r.best_family),type:'bar',marker:{color:rows.map((_,i)=>i),colorscale:'Viridis'},hovertemplate:'%{x}<br>%{text}<br>R²=%{y:.4f}<extra></extra>'}],{paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{color:'#e8ecf8'},yaxis:{gridcolor:'#243055'},margin:{t:20,l:50,r:10,b:120}},{displayModeBar:false,responsive:true});
  Plotly.newPlot('r2Bars', rows.map(r=>({x:r.leaderboard.map(x=>x.family),y:r.leaderboard.map(x=>x.r2),type:'bar',name:r.organism})), {barmode:'group',paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{color:'#e8ecf8'},yaxis:{gridcolor:'#243055'},margin:{t:20,l:50,r:10,b:120}}, {displayModeBar:false,responsive:true});
  document.getElementById('resultTable').innerHTML=`<thead><tr><th>organism</th><th>n</th><th>best family</th><th>leaderboard</th><th>example predictions</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.organism}</td><td>${r.n}</td><td>${r.best_family}</td><td>${r.leaderboard.map(x=>`${x.family}: R² ${fmt(x.r2)} · MAE ${fmt(x.mae)}`).join('<br>')}</td><td>${r.examples.map(ex=>`${ex.peptide}<br>actual ${fmt(ex.actual_neg_log2_mic)} · pred ${fmt(ex.predicted_neg_log2_mic)}<br>${ex.best_family}`).join('<hr style="border-color:#243055">')}</td></tr>`).join('')}</tbody>`;
});
</script>
</body>
</html>
