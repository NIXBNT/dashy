<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peptide Dashboard · Models</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { --bg:#0b1020; --panel:#121933; --text:#e8ecf8; --muted:#98a2c3; --accent:#6ee7ff; --border:#243055; }
    * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#0b1020,#0f1731); color:var(--text); }
    .wrap{max-width:1400px;margin:0 auto;padding:24px;} .panel{background:rgba(18,25,51,.88);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px;} .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;} .span-6{grid-column:span 6;} .span-12{grid-column:span 12;} .nav{position:sticky;top:0;z-index:10;background:rgba(11,16,32,.88);border-bottom:1px solid var(--border);margin:-24px -24px 20px;padding:14px 24px;} .nav a{display:inline-block;margin-right:12px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;text-decoration:none;color:var(--text);} .table-wrap{max-height:640px;overflow:auto;} table{width:100%;border-collapse:collapse;} th,td{padding:10px 8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;} th{position:sticky;top:0;background:var(--panel);} p{color:var(--muted)} @media(max-width:900px){.span-6,.span-12{grid-column:span 12;}}
  </style>
</head>
<body>
<div class="wrap">
  <nav class="nav" id="nav"></nav>
  <div class="panel">
    <h1>Predictive Models</h1>
    <p>Dedicated view for target-specific prediction performance and feature-set comparisons.</p>
  </div>
  <div class="grid">
    <div class="panel span-6"><h2>Best R² by target</h2><div id="r2bars" style="height:420px"></div></div>
    <div class="panel span-6"><h2>v2 improvement vs earlier baseline</h2><div id="deltaBars" style="height:420px"></div></div>
    <div class="panel span-12"><h2>Best model by target</h2><div class="table-wrap"><table id="modelTable"></table></div></div>
  </div>
</div>
<script>
const fmt=(n,d=4)=>n==null?'—':Number(n).toFixed(d);
fetch('./data.json').then(r=>r.json()).then(data=>{
  const sections=data.dashboardMeta?.sections||[];
  document.getElementById('nav').innerHTML=sections.map(s=>`<a href="./${s.page||'index.html'}">${s.label}</a>`).join('');
  const rows=data.currentAnalysis.results;
  Plotly.newPlot('r2bars',[{x:rows.map(r=>r.target),y:rows.map(r=>r.r2),type:'bar',marker:{color:rows.map(r=>r.r2),colorscale:'Viridis'}}],{paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{color:'#e8ecf8'},yaxis:{range:[0,1],gridcolor:'#243055'},margin:{t:20,l:50,r:10,b:60}},{displayModeBar:false,responsive:true});
  Plotly.newPlot('deltaBars',[{x:rows.map(r=>r.target),y:rows.map(r=>r.delta_vs_v1),type:'bar',marker:{color:rows.map(r=>r.delta_vs_v1),colorscale:'RdBu'}}],{paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{color:'#e8ecf8'},yaxis:{gridcolor:'#243055'},margin:{t:20,l:50,r:10,b:60}},{displayModeBar:false,responsive:true});
  const cols=['target','best_feature_set','best_model','v1_r2','v2_r2','v3_r2','mae','rmse','delta_vs_v1','delta_vs_v2'];
  document.getElementById('modelTable').innerHTML=`<thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${typeof r[c]==='number'?fmt(r[c]):r[c]}</td>`).join('')}</tr>`).join('')}</tbody>`;
});
</script>
</body>
</html>
